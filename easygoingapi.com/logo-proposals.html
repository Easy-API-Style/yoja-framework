<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Logo proposals — Yoja</title>
  <style>
    body { background: #0f0f0f; color: #e5e5e5; font-family: system-ui, sans-serif; display: flex; flex-direction: column; gap: 3.5rem; padding: 3rem; }
    .item { display: flex; flex-direction: column; align-items: flex-start; gap: 0.75rem; }
    .label { font-size: 0.85rem; color: #888; letter-spacing: 0.05em; }
  </style>
</head>
<body>

<!-- F: hexagone contour + "yoja" à droite, Y en violet fort, oja en violet clair -->
<div class="item">
  <svg width="300" height="80" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
    <polygon points="40,2 78,21 78,59 40,78 2,59 2,21" fill="none" stroke="#8b5cf6" stroke-width="3"/>
    <text x="40" y="40" text-anchor="middle" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="50" font-weight="900" fill="#8b5cf6">Y</text>
    <text x="92" y="40" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="40" font-weight="700" fill="#7c3aed">o</text>
    <text x="122" y="40" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="40" font-weight="700" fill="#8b5cf6">j</text>
    <text x="140" y="40" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="40" font-weight="700" fill="#a78bfa">a</text>
  </svg>
  <span class="label">F — Y dans hexagone + oja dégradé de couleur</span>
</div>

<!-- G: hexagone + "yoja" sur deux niveaux -->
<div class="item">
  <svg width="180" height="100" viewBox="0 0 180 100" xmlns="http://www.w3.org/2000/svg">
    <polygon points="36,2 70,20 70,56 36,74 2,56 2,20" fill="none" stroke="#8b5cf6" stroke-width="3"/>
    <text x="36" y="38" text-anchor="middle" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="46" font-weight="900" fill="#8b5cf6">Y</text>
    <text x="85" y="28" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="28" font-weight="900" fill="#8b5cf6">oja</text>
    <text x="85" y="58" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="13" font-weight="300" letter-spacing="3" fill="#a78bfa">FRAMEWORK</text>
  </svg>
  <span class="label">G — Y hexagone + "oja" / "FRAMEWORK"</span>
</div>

<!-- H: "Y" grand + trait vertical + "oja" aligné milieu -->
<div class="item">
  <svg width="260" height="80" viewBox="0 0 260 80" xmlns="http://www.w3.org/2000/svg">
    <text x="0" y="40" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="70" font-weight="900" fill="#8b5cf6">Y</text>
    <line x1="56" y1="10" x2="56" y2="70" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <text x="68" y="40" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="38" font-weight="300" letter-spacing="6" fill="#a78bfa">oja</text>
  </svg>
  <span class="label">H — grand Y + séparateur + "oja" fin</span>
</div>

<!-- I: "yoja" entier stylisé, Y en violet fort le reste plus clair -->
<div class="item">
  <svg width="260" height="80" viewBox="0 0 260 80" xmlns="http://www.w3.org/2000/svg">
    <text x="0" y="58" dominant-baseline="auto"
          font-family="system-ui,sans-serif" font-size="68" font-weight="900" fill="#8b5cf6">Y</text>
    <text x="50" y="58" dominant-baseline="auto"
          font-family="system-ui,sans-serif" font-size="68" font-weight="200" fill="#a78bfa">oja</text>
  </svg>
  <span class="label">I — Y bold + oja ultraléger, même hauteur</span>
</div>

<!-- J: hexagone contour fin + "yoja" centré dessous espacé -->
<div class="item">
  <svg width="160" height="140" viewBox="0 0 160 140" xmlns="http://www.w3.org/2000/svg">
    <polygon points="80,4 156,43 156,101 80,136 4,101 4,43" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <text x="80" y="72" text-anchor="middle" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="72" font-weight="900" fill="#8b5cf6">Y</text>
    <text x="80" y="128" text-anchor="middle" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="16" font-weight="400" letter-spacing="10" fill="#a78bfa">YOJA</text>
  </svg>
  <span class="label">J — grand hexagone + YOJA espacé dessous</span>
</div>

<!-- K: deux hexagones imbriqués + Y + point accent -->
<div class="item">
  <svg width="300" height="80" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
    <polygon points="40,2 78,21 78,59 40,78 2,59 2,21" fill="none" stroke="#8b5cf6" stroke-width="2.5"/>
    <polygon points="40,10 70,26 70,54 40,70 10,54 10,26" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.35"/>
    <text x="40" y="40" text-anchor="middle" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="44" font-weight="900" fill="#8b5cf6">Y</text>
    <text x="94" y="40" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="#a78bfa">oja</text>
    <circle cx="92" cy="16" r="4" fill="#8b5cf6"/>
  </svg>
  <span class="label">K — double hexagone + point accent</span>
</div>

</body>
</html>
