name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & test (JDK 25)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # yoja-web and yoja-selenium tests run Firefox and Chrome in headless mode
      - name: Install browsers if missing
        run: |
          command -v firefox       || sudo apt-get install -y --no-install-recommends firefox
          command -v google-chrome || sudo apt-get install -y --no-install-recommends google-chrome-stable

      - name: Run all tests
        run: ./gradlew --no-daemon test

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore
