<div class="id-section">
    <label for="familyName" yw-i18n="familyName"></label> 
    <input name="familyName"
           placeholder="" 
           yw-i18n-placeholder="familyNamePlaceholder"/>
    <label for="firstName" yw-i18n="firstName"></label>
    <input name="firstName"
           placeholder="" 
           yw-i18n-placeholder="firstNamePlaceholder"/>
</div>
<div class="address-section"
     yw-css="./address.css" 
     yw-language="/lang.xml">
    <fieldset>
        <legend yw-i18n="address"></legend>
        <label for="street" yw-i18n="street"></label> 
        <input type="text" name="street" /> 
        <label for="city" yw-i18n="city"></label> 
        <input type="text" name="city" /> 
        <label for="postcode" yw-i18n="postcode"></label>
        <input type="text" name="postcode" />
    </fieldset>
</div>
<div class="order-section"
     yw-css="../order/order.css" 
     yw-controler="../order/order.ctl.js"
     yw-language="/lang.xml"
     yw-slot="../order/order.cpt.html">
</div>
